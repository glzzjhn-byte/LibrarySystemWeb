<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apex Library System</title>
  <link rel="icon" type="image/x-icon" href="ImagesVidoes/LibraryImage.png">

  <!-- Tailwind CSS Framework -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React and ReactDOM Frameworks -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  
  <!-- Babel  -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased selection:bg-indigo-200 selection:text-indigo-900">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;
    const API_URL = 'https://nexus-status.42web.io/Main.php';

    const apiFetch = async (url, options = {}) => {
      return fetch(url, {
        ...options,
        credentials: 'include', 
      });
    };

    // --- Icons ---
    const BookIcon = () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" className="w-8 h-8"><path strokeLinecap="round" strokeLinejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>;
    const SearchIcon = () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor" className="w-5 h-5 text-gray-400"><path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" /></svg>;
    const TrashIcon = () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" className="w-4 h-4 mr-1"><path strokeLinecap="round" strokeLinejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" /></svg>;
    const PlusIcon = () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor" className="w-4 h-4 mr-1"><path strokeLinecap="round" strokeLinejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg>;
    const BuildingIcon = () => <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" className="w-6 h-6"><path strokeLinecap="round" strokeLinejoin="round" d="M2.25 21h19.5m-18-18v18m10.5-18v18m6-13.5V21M6.75 6.75h.75m-.75 3h.75m-.75 3h.75m3-6h.75m-.75 3h.75m-.75 3h.75M6.75 21v-3.375c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21M3 3h12m-.75 4.5H21m-3.75 3.75h.008v.008h-.008v-.008zm0 3h.008v.008h-.008v-.008zm0 3h.008v.008h-.008v-.008z" /></svg>;

   
    const Input = (props) => <input {...props} className={`w-full px-4 py-3 bg-gray-50/50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all placeholder-gray-400 ${props.className || ''}`} />;
    const Button = ({ children, variant = 'primary', ...props }) => {
      const baseStyle = "w-full px-5 py-3 font-semibold rounded-xl focus:outline-none focus:ring-2 focus:ring-offset-2 transition-all transform active:scale-[0.98] disabled:opacity-70 disabled:cursor-not-allowed flex justify-center items-center shadow-sm";
      const variants = {
        primary: "bg-gradient-to-r from-indigo-600 to-purple-600 text-white hover:from-indigo-700 hover:to-purple-700 focus:ring-indigo-500 shadow-indigo-200",
        secondary: "bg-white text-gray-700 border border-gray-200 hover:bg-gray-50 focus:ring-gray-200",
        danger: "bg-red-50 text-red-600 border border-red-100 hover:bg-red-100 focus:ring-red-500",
        success: "bg-emerald-50 text-emerald-600 border border-emerald-100 hover:bg-emerald-100 focus:ring-emerald-500"
      };
      return <button {...props} className={`${baseStyle} ${variants[variant]} ${props.className || ''}`}>{children}</button>;
    };
    const Card = ({ children, ...props }) => <div {...props} className={`bg-white shadow-[0_8px_30px_rgb(0,0,0,0.04)] rounded-2xl border border-gray-100 ${props.className || ''}`}>{children}</div>;

    // --- Authentication Screen ---
    function AuthScreen({ onLogin }) {
      const [authMode, setAuthMode] = useState('login'); // 'login', 'register_user', 'register_library'
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [libraryName, setLibraryName] = useState('');
      const [libraryDesc, setLibraryDesc] = useState('');
      const [message, setMessage] = useState({ text: '', isError: false });

      const handleSubmit = async (e) => {
        e.preventDefault();
        let action = 'login';
        let body = { username, password };

        if (authMode === 'register_user') {
          action = 'register';
        } else if (authMode === 'register_library') {
          action = 'register_library_admin';
          body = { username, password, library_name: libraryName, library_desc: libraryDesc };
        }

        try {
          const response = await apiFetch(`${API_URL}?action=${action}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
          const data = await response.json();
          if (!response.ok) throw new Error(data.message || 'An error occurred.');

          if (authMode !== 'login') {
            setMessage({ text: data.message || 'Registration successful! Please log in.', isError: false });
            setAuthMode('login');
          } else {
            onLogin(data.user); 
          }
        } catch (error) {
          setMessage({ text: error.message, isError: true });
        }
      };

      return (
        <div className="min-h-screen flex flex-col items-center justify-center bg-gradient-to-br from-slate-900 via-indigo-900 to-purple-900 px-4 py-10 relative overflow-x-hidden">
          <div className="fixed inset-0 pointer-events-none z-0">
            <div className="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCI+PHBhdGggZD0iTTAgMGg0MHY0MEgweiIgZmlsbD0ibm9uZSIvPjxwYXRoIGQ9Ik0wIDEwaDQwdjFIMHptMTAgMTBoMzB2MUgxMHptMTAgMTBoMjB2MUgyMHoiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wNCkiLz48L3N2Zz4=')] opacity-50"></div>
            <div className="absolute -top-32 -left-32 w-96 h-96 bg-indigo-500 rounded-full mix-blend-screen filter blur-[120px] opacity-50"></div>
            <div className="absolute -bottom-32 -right-32 w-96 h-96 bg-fuchsia-500 rounded-full mix-blend-screen filter blur-[120px] opacity-50"></div>
          </div>
          
          <Card className="max-w-md w-full p-6 sm:p-8 md:p-10 space-y-6 sm:space-y-8 relative z-10 !bg-white/95 backdrop-blur-xl border border-white/50 shadow-2xl shadow-black/30 my-auto">
            <div className="text-center">
              <div className="mx-auto w-12 h-12 sm:w-16 sm:h-16 bg-gradient-to-tr from-indigo-600 to-purple-600 rounded-2xl flex items-center justify-center text-white mb-4 sm:mb-6 shadow-lg shadow-indigo-200 transform -rotate-3"><BookIcon /></div>
              <h2 className="text-2xl sm:text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-gray-900 to-gray-600">
                {authMode === 'login' ? 'Welcome Back' : authMode === 'register_user' ? 'Create Account' : 'Establish Library'}
              </h2>
              <p className="mt-2 text-sm text-gray-500">
                {authMode === 'login' ? 'Enter your credentials to access the system' : authMode === 'register_user' ? 'Register to join existing libraries' : 'Register an admin account and new library'}
              </p>
            </div>
            {message.text && <div className={`p-4 rounded-xl text-sm font-medium text-center ${message.isError ? 'bg-red-50 text-red-600 border border-red-100' : 'bg-emerald-50 text-emerald-600 border border-emerald-100'}`}>{message.text}</div>}
            <form onSubmit={handleSubmit} className="space-y-5">
              <Input type="text" placeholder="Username" value={username} onChange={(e) => setUsername(e.target.value)} required />
              <Input type="password" placeholder="Password" value={password} onChange={(e) => setPassword(e.target.value)} required />
              
              {authMode === 'register_library' && (
                <div className="space-y-5 pt-3 border-t border-gray-100">
                  <Input type="text" placeholder="Library Name" value={libraryName} onChange={(e) => setLibraryName(e.target.value)} required />
                  <Input type="text" placeholder="Description (Optional)" value={libraryDesc} onChange={(e) => setLibraryDesc(e.target.value)} />
                </div>
              )}

              <Button type="submit">{authMode === 'login' ? 'Login' : authMode === 'register_user' ? 'Register Account' : 'Register Admin & Library'}</Button>
            </form>
            <div className="space-y-3 text-center text-sm text-gray-500 flex flex-col pt-2">
              {authMode !== 'login' && <button type="button" onClick={() => setAuthMode('login')} className="font-semibold text-indigo-600 hover:text-indigo-500 transition-colors">Already have an account? Login</button>}
              {authMode !== 'register_user' && <button type="button" onClick={() => setAuthMode('register_user')} className="font-semibold text-indigo-600 hover:text-indigo-500 transition-colors">Need an account? Register Member</button>}
              {authMode !== 'register_library' && <button type="button" onClick={() => setAuthMode('register_library')} className="font-semibold text-indigo-600 hover:text-indigo-500 transition-colors">Run a library? Register Library</button>}
            </div>
          </Card>
        </div>
      );
    }

    // --- Policy Acceptance Screen ---
    function PolicyScreen({ onAccept }) {
      const [agreed, setAgreed] = useState(false);
      const [showPolicy, setShowPolicy] = useState(false);

      const handleAccept = async () => {
        if (!agreed) return;
        try {
          await apiFetch(`${API_URL}?action=accept_policy`, { method: 'POST' });
          onAccept();
        } catch (e) {
          console.error(e);
        }
      };

      return (
        <div className="min-h-screen flex flex-col items-center justify-center bg-gradient-to-br from-slate-900 via-indigo-900 to-purple-900 px-4 py-10 relative overflow-x-hidden">
          <div className="fixed inset-0 pointer-events-none z-0">
            <div className="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCI+PHBhdGggZD0iTTAgMGg0MHY0MEgweiIgZmlsbD0ibm9uZSIvPjxwYXRoIGQ9Ik0wIDEwaDQwdjFIMHptMTAgMTBoMzB2MUgxMHptMTAgMTBoMjB2MUgyMHoiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wNCkiLz48L3N2Zz4=')] opacity-50"></div>
          </div>
          <Card className="max-w-xl w-full p-6 sm:p-8 md:p-10 space-y-6 sm:space-y-8 relative z-10 !bg-white/95 backdrop-blur-xl border border-white/50 shadow-2xl shadow-black/30 my-auto">
             <div className="text-center">
               <div className="mx-auto w-12 h-12 sm:w-16 sm:h-16 bg-gradient-to-tr from-indigo-600 to-purple-600 rounded-2xl flex items-center justify-center text-white mb-4 sm:mb-6 shadow-lg shadow-indigo-200 transform -rotate-3"><BookIcon/></div>
               <h2 className="text-2xl sm:text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-gray-900 to-gray-600">Welcome to Apex Library</h2>
               <p className="text-gray-500 mt-2 font-medium">Before entering, please review our platform policies.</p>
             </div>
             
             <div className="flex items-center gap-3 bg-gray-50 p-4 rounded-xl border border-gray-200 shadow-inner">
               <input type="checkbox" id="policyCheck" checked={agreed} onChange={e => setAgreed(e.target.checked)} className="w-5 h-5 text-indigo-600 rounded focus:ring-indigo-500 cursor-pointer"/>
               <label htmlFor="policyCheck" className="text-gray-700 cursor-pointer font-medium select-none flex-grow">
                 I agree to the <button onClick={(e) => { e.preventDefault(); e.stopPropagation(); setShowPolicy(true); }} className="text-indigo-600 hover:text-indigo-800 underline font-bold">Policy Guidelines</button>
               </label>
             </div>

             <Button onClick={handleAccept} disabled={!agreed} className={!agreed ? "opacity-50 cursor-not-allowed" : ""}>Continue to Website</Button>
          </Card>

          {showPolicy && (
             <div className="fixed inset-0 z-50 bg-black/60 flex items-center justify-center p-4 backdrop-blur-sm">
                <Card className="max-w-3xl w-full max-h-[80vh] flex flex-col !p-0 overflow-hidden shadow-2xl">
                   <div className="p-5 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                      <h3 className="font-extrabold text-lg text-gray-800">Apex Library Policy Guidelines</h3>
                      <button onClick={() => setShowPolicy(false)} className="text-gray-400 hover:text-gray-800 font-bold text-2xl transition-colors">&times;</button>
                   </div>
                   <div className="p-6 md:p-8 overflow-y-auto text-sm text-gray-600 space-y-6 flex-grow bg-white">
                      <div>
                        <h4 className="font-bold text-gray-900 text-base mb-2">1. Introduction</h4>
                        <p className="leading-relaxed">Welcome to Apex Library. By accessing or using our platform, you agree to be bound by these Policy Guidelines. If you do not agree to all the terms and conditions, you must not access the website.</p>
                      </div>
                      <div>
                        <h4 className="font-bold text-gray-900 text-base mb-2">2. Data Collection and Transparency</h4>
                        <p className="leading-relaxed mb-2">We believe in full transparency regarding your data. We collect and store the following information:</p>
                        <ul className="list-disc pl-5 space-y-2 text-gray-600">
                          <li><strong>IP Addresses:</strong> Used strictly for security, rate-limiting, and tracking policy acceptance to prevent abuse of the platform.</li>
                          <li><strong>Account Information:</strong> Usernames and hashed passwords are stored securely. We do not store plain-text passwords under any circumstances.</li>
                          <li><strong>Library Data:</strong> Books, E-Books, Manga, and Novels you add to your libraries or personal account are stored in our database so you can access them later.</li>
                          <li><strong>Communication:</strong> Messages sent in the discussion boards are stored to maintain chat history for your community.</li>
                        </ul>
                      </div>
                      <div>
                        <h4 className="font-bold text-gray-900 text-base mb-2">3. Acceptable Use</h4>
                        <p className="leading-relaxed">You agree not to use the platform in any way that causes, or may cause, damage to the website or impairment of the availability or accessibility of the platform. This includes engaging in automated data mining, unauthorized scraping, or executing denial-of-service attacks.</p>
                      </div>
                      <div>
                        <h4 className="font-bold text-gray-900 text-base mb-2">4. Third-Party Content</h4>
                        <p className="leading-relaxed">Apex Library integrates with third-party APIs (such as OpenLibrary, Internet Archive, MangaDex, and Project Gutenberg) to provide content seamlessly. We do not host the actual media files on our servers (unless explicitly uploaded by IT/Head roles as dashboard media). We are not responsible for the accuracy, copyright compliance, or legality of material contained within third-party services.</p>
                      </div>
                      <div>
                        <h4 className="font-bold text-gray-900 text-base mb-2">5. Changes to the Policy</h4>
                        <p className="leading-relaxed">We reserve the right to modify these policies at any time. Your continued use of the platform after any such changes constitutes your acceptance of the new Policy Guidelines.</p>
                      </div>
                   </div>
                   <div className="p-4 border-t border-gray-100 bg-gray-50 flex justify-end">
                      <Button variant="secondary" onClick={() => setShowPolicy(false)} className="!w-auto px-6">Close Document</Button>
                   </div>
                </Card>
             </div>
          )}
        </div>
      );
    }

    // --- Book Card Component ---
    function BookCard({ book, onAction, actionType, onClick, onRead }) {
      const handleAction = (e) => {
        if (e) e.stopPropagation();
        if (actionType === 'delete') onAction(book.id);
        else if (actionType === 'add') onAction(book);
      };

      const statusConfig = {
        local: { text: 'In Library', color: 'bg-indigo-100 text-indigo-700' },
        personal: { text: 'My Account', color: 'bg-pink-100 text-pink-700' },
        available: { text: 'In System', color: 'bg-emerald-100 text-emerald-700' },
        online: { text: 'Online', color: 'bg-purple-100 text-purple-700' }
      };
      const currentStatus = statusConfig[book.status] || statusConfig.online;
      const safeIsbn = String(book.isbn || '');
      const isIA = safeIsbn.startsWith('IA:');
      const iaId = isIA ? safeIsbn.split(':')[1] : null;
      const isGutenberg = safeIsbn.startsWith('GUTEN:');
      const gutenbergId = isGutenberg ? safeIsbn.split(':')[1] : null;      
      const coverSrc = book.cover_url || (safeIsbn && safeIsbn !== 'N/A' && !/^(MDEX|MAL|GUTEN|CSMT|IA):/.test(safeIsbn) ? `https://covers.openlibrary.org/b/isbn/${safeIsbn}-M.jpg` : null);
      return (
        <div onClick={onClick} className={`bg-white rounded-2xl shadow-[0_2px_15px_-3px_rgba(0,0,0,0.07),0_10px_20px_-2px_rgba(0,0,0,0.04)] border border-gray-100 overflow-hidden hover:shadow-xl hover:-translate-y-1 transition-all duration-300 flex flex-col h-full group ${onClick ? 'cursor-pointer' : ''}`}>
          <div className="h-48 bg-gradient-to-br from-indigo-500 to-purple-600 relative overflow-hidden">
            {coverSrc ? (
              <img src={coverSrc} alt={book.title} className="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
            ) : (
              <>
                <div className="absolute inset-0 bg-black/10"></div>
                <div className="absolute -bottom-6 -right-6 w-24 h-24 bg-white/10 rounded-full blur-xl group-hover:bg-white/20 transition-all"></div>
              </>
            )}
            <div className="absolute top-3 right-3">
              <span className={`text-[10px] font-bold uppercase tracking-wider px-2.5 py-1 rounded-full shadow-sm backdrop-blur-md bg-white/90 ${currentStatus.color.replace('bg-', 'text-').split(' ')[1]}`}>{currentStatus.text}</span>
            </div>
          </div>
          
          <div className="p-5 flex flex-col flex-grow bg-white relative">
            <h3 className="text-lg font-bold text-gray-900 mb-1 line-clamp-2 leading-tight group-hover:text-indigo-600 transition-colors">{book.title}</h3>
            <p className="text-gray-500 text-sm mb-4 line-clamp-1">{book.media_type === 'manga' ? 'Story & Art' : 'by'} {book.author}</p>
            {book.media_type !== 'manga' && <p className="text-xs text-gray-400 mt-auto font-mono bg-gray-50 inline-block px-2 py-1 rounded-md border border-gray-100 w-fit">ISBN: {book.isbn}</p>}
            
            {(actionType || (isGutenberg && (book.status === 'local' || book.status === 'personal')) || (isIA && (book.status === 'local' || book.status === 'personal'))) && (
              <div className="mt-5 pt-4 border-t border-gray-50 flex flex-col gap-2">
                {actionType && (actionType === 'delete' ? <Button variant="danger" className="!py-2 !text-sm" onClick={handleAction}><TrashIcon/> Remove</Button> : <Button variant="success" className="!py-2 !text-sm" onClick={handleAction}><PlusIcon/> Add to Library</Button>)}
                {isGutenberg && (book.status === 'local' || book.status === 'personal') && (
                  <Button variant="secondary" className="!py-2 !text-sm" onClick={(e) => { e.stopPropagation(); if (onRead) onRead(book); else window.open(`https://www.gutenberg.org/ebooks/${gutenbergId}.html.images`, '_blank'); }}>📖 Read Book</Button>
                )}
                {isIA && (book.status === 'local' || book.status === 'personal') && (
                  <Button variant="secondary" className="!py-2 !text-sm" onClick={(e) => { e.stopPropagation(); if (onRead) onRead(book); else window.open(`https://archive.org/details/${iaId}`, '_blank'); }}>📖 Read E-Book</Button>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    // --- Add Book Form ---
    function AddBookForm({ onAddBook, onCancel }) {
      const [title, setTitle] = useState('');
      const [author, setAuthor] = useState('');
      const [isbn, setIsbn] = useState('');

      const handleSubmit = (e) => {
        e.preventDefault();
        onAddBook({ title, author, isbn });
        setTitle('');
        setAuthor('');
        setIsbn('');
      };

      return (
        <Card className="mb-10 max-w-xl mx-auto border-indigo-100 shadow-indigo-100/50">
          <form onSubmit={handleSubmit} className="space-y-5 p-2">
            <h2 className="text-xl font-bold text-gray-800 flex items-center gap-2"><PlusIcon/> Add Book Manually</h2>
            <Input type="text" placeholder="Title" value={title} onChange={e => setTitle(e.target.value)} required />
            <Input type="text" placeholder="Author" value={author} onChange={e => setAuthor(e.target.value)} required />
            <Input type="text" placeholder="ISBN" value={isbn} onChange={e => setIsbn(e.target.value)} required />
            <div className="flex gap-3 pt-2">
              <Button type="button" variant="secondary" onClick={onCancel}>Cancel</Button>
              <Button type="submit" variant="primary">Save to Library</Button>
            </div>
          </form>
        </Card>
      );
    }

    // --- Library Selection / Portal Screen ---
    function LibraryPortal({ user, onSelectLibrary, onLogout }) {
      const [myLibraries, setMyLibraries] = useState([]);
      const [searchQuery, setSearchQuery] = useState('');
      const [searchResults, setSearchResults] = useState([]);
      
      // Join Form State
      const [joinCode, setJoinCode] = useState('');

      // Actions Forms State
      const [showJoinForm, setShowJoinForm] = useState(false);
      const [showCreateForm, setShowCreateForm] = useState(false);
      
      // Create Form State
      const [newLibName, setNewLibName] = useState('');
      const [newLibDesc, setNewLibDesc] = useState('');
      
      useEffect(() => {
        fetchMyLibraries();
      }, []);

      const fetchMyLibraries = async () => {
        const res = await apiFetch(`${API_URL}?action=my_libraries&user_id=${user.id}`);
        setMyLibraries(await res.json());
      };

      const handleSearch = async (e) => {
        e.preventDefault();
        const res = await apiFetch(`${API_URL}?action=search_libraries&q=${encodeURIComponent(searchQuery)}`);
        setSearchResults(await res.json());
      };

      const handleJoin = async (e) => {
        e.preventDefault();
        try {
          const res = await apiFetch(`${API_URL}?action=join_library`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id: user.id, join_string: joinCode })
          });
          const data = await res.json();
          alert(data.message);
          if (res.ok) {
            setJoinCode('');
            setShowJoinForm(false);
            fetchMyLibraries();
          }
        } catch (err) { alert('Error joining library'); }
      };

              {/* Atom/Science Icon - Bottom Right */}
              <svg className="absolute bottom-[15%] right-[5%] w-48 h-48 text-indigo-500/10 -rotate-12" fill="currentColor" viewBox="0 0 24 24"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zm0-5C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
              
              {/* Pencil/Edit Icon - Mid Left */}
              <svg className="absolute top-[40%] left-[80%] w-24 h-24 text-purple-500/10 rotate-45" fill="currentColor" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>

            {/* 3. Glowing "Aura" */}
            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-blue-600/10 rounded-full blur-[120px] z-0"></div>

                  <p className="text-gray-500">Select your library to continue.</p>

                <div className="flex flex-wrap gap-2 w-full md:w-auto">
                  <Button onClick={() => { setShowJoinForm(!showJoinForm); setShowCreateForm(false); }} variant="secondary" className="flex-1 md:flex-none w-auto !py-2 !px-4 !text-sm">Join Library</Button>

                  <Input type="text" placeholder="Format: [Libraryname]_(codes)" value={joinCode} onChange={e => setJoinCode(e.target.value)} required />
                  <div className="flex gap-2">
                    <Button type="button" variant="secondary" onClick={() => setShowJoinForm(false)} className="w-auto">Cancel</Button>
                    <Button type="submit" className="w-auto whitespace-nowrap">Join</Button>

                <form onSubmit={handleCreate} className="space-y-4">
                  <Input type="text" placeholder="Library Name" value={newLibName} onChange={e => setNewLibName(e.target.value)} required />
                  <Input type="text" placeholder="Description (Optional)" value={newLibDesc} onChange={e => setNewLibDesc(e.target.value)} />

                    <Button type="button" variant="secondary" onClick={() => setShowCreateForm(false)} className="w-auto">Cancel</Button>

                    <h2 className="text-xl font-bold mb-2">No Libraries Found</h2>

    // --- Manga Reader Components ---
    function MangaPageImage({ page, index }) {
      const [currentSrc, setCurrentSrc] = useState(page.src);
      const [retries, setRetries] = useState(0);
      const [hasError, setHasError] = useState(false);

      useEffect(() => {
        setCurrentSrc(page.src);
        setRetries(0);
        setHasError(false);
      }, [page.src]);

      const handleError = () => {
        const originalSrc = page.src;
        const fallbackSrc = page.fallbackSrc;

        if (retries === 0) {
          setRetries(1);
          setCurrentSrc(`${API_URL}?action=proxy_image&url=${encodeURIComponent(originalSrc)}`);
        } else if (retries === 1 && fallbackSrc) {
          setRetries(2);
          setCurrentSrc(fallbackSrc);
        } else if (retries === 2 && fallbackSrc) {
          setRetries(3);
          setCurrentSrc(`${API_URL}?action=proxy_image&url=${encodeURIComponent(fallbackSrc)}`);
        } else {
          setHasError(true);
        }
      };

      if (hasError) {
        return (
          <div className="w-full max-w-3xl h-64 bg-gray-800 flex flex-col items-center justify-center text-gray-500 shadow-sm border-b border-gray-900">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" className="w-10 h-10 mb-2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
            <span>Failed to load Page {index + 1}</span>
            <button onClick={() => { setRetries(0); setHasError(false); setCurrentSrc(`${page.src}?force_reload=${Date.now()}`); }} className="mt-4 px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-bold rounded-lg transition-colors">Reload Page</button>
          </div>
        );
      }

      return <img src={currentSrc} onError={handleError} alt={`Page ${index + 1}`} className="w-full max-w-3xl object-contain bg-gray-900" loading="lazy" referrerPolicy="no-referrer" />;
    }

    function MangaChapterReader({ manga, chapterId, chapters = [], onChapterChange, onBack }) {
      const [pages, setPages] = useState([]);
      const [loading, setLoading] = useState(true);

      const currentIndex = chapters.findIndex(c => c.id === chapterId);
      const hasNextChapter = currentIndex > 0; // Since sorted descending, 0 is newest
      const hasPrevChapter = currentIndex < chapters.length - 1 && currentIndex !== -1;
      
      useEffect(() => {
        const getPages = async () => {
          setLoading(true);
          try {
            const res = await apiFetch(`${API_URL}?action=get_manga_pages&chapter_id=${chapterId}`);
            const data = await res.json();
            if (data.result === 'ok') {
              const host = data.baseUrl;
              const hash = data.chapter.hash;
              if (data.chapter && data.chapter.data) {
                const pageObjects = data.chapter.data.map((file, i) => ({ src: `${host}/data/${hash}/${file}`, fallbackSrc: data.chapter.dataSaver ? `${host}/data-saver/${hash}/${data.chapter.dataSaver[i]}` : null }));
                setPages(pageObjects);
              } else {
                setPages([]);
              }
            }
          } catch (e) { console.error(e); }
          setLoading(false);
        };
        if (chapterId) getPages();
      }, [chapterId, manga.isbn]);
      return (
        <div className="fixed inset-0 z-[200] bg-gray-950 flex flex-col">
          <div className="bg-gray-900 text-white p-3 md:p-4 flex items-center justify-between shadow-md gap-2 md:gap-4">
            <button onClick={onBack} className="text-gray-300 hover:text-white px-3 py-2 bg-gray-800 hover:bg-gray-700 rounded-lg transition-colors whitespace-nowrap text-sm font-medium">← Back</button>
            
            <div className="flex-grow flex justify-center min-w-0">
              {chapters.length > 0 ? (
                <div className="flex items-center gap-2 w-full max-w-md">
                  <button 
                    onClick={() => onChapterChange(chapters[currentIndex + 1].id)}
                    disabled={!hasPrevChapter}
                    className="p-2 bg-gray-800 hover:bg-gray-700 disabled:opacity-30 disabled:cursor-not-allowed rounded-lg transition-colors flex-shrink-0"
                    title="Previous Chapter"
                  >
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor" className="w-5 h-5"><path strokeLinecap="round" strokeLinejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" /></svg>
                  </button>
                  
                  <select 
                    className="bg-gray-800 border border-gray-700 text-white text-sm font-bold rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block w-full p-2.5 truncate"
                    value={chapterId}
                    onChange={(e) => onChapterChange(e.target.value)}
                  >
                    {chapters.map(c => (
                      <option key={c.id} value={c.id}>
                        Ch. {c.attributes.chapter || '?'} {c.attributes.title ? `- ${c.attributes.title}` : ''}
                      </option>
                    ))}
                  </select>

                  <button 
                    onClick={() => onChapterChange(chapters[currentIndex - 1].id)}
                    disabled={!hasNextChapter}
                    className="p-2 bg-gray-800 hover:bg-gray-700 disabled:opacity-30 disabled:cursor-not-allowed rounded-lg transition-colors flex-shrink-0"
                    title="Next Chapter"
                  >
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor" className="w-5 h-5"><path strokeLinecap="round" strokeLinejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" /></svg>
                  </button>
                </div>
              ) : (
                <div className="font-bold">Reader</div>
              )}
            </div>
            <div className="hidden md:block w-[80px]"></div>
          </div>
          <div className="flex-grow overflow-y-auto flex flex-col items-center pb-20">
            {loading ? (
              <div className="text-gray-400 mt-20 animate-pulse font-medium">Loading pages...</div>
            ) : pages.length > 0 ? pages.map((page, i) => (
              <MangaPageImage key={i} page={page} index={i} />
            )) : (
              <div className="text-gray-400 mt-20 font-medium px-4 text-center">No image panels found. This chapter might be an external link, or currently unavailable.</div>
            )}
          </div>
        </div>
      );
    }

    function MangaView({ manga, onBack }) {
      const [chapters, setChapters] = useState([]);
      const [loading, setLoading] = useState(true);
      const [readingChapter, setReadingChapter] = useState(null);
      const [currentPage, setCurrentPage] = useState(1);
      const chaptersPerPage = 20;

      useEffect(() => {
        const fetchChapters = async () => {
          const mangaId = String(manga.isbn || '').replace('MDEX:', '');

          try {
            const res = await apiFetch(`${API_URL}?action=get_manga_chapters&manga_id=${mangaId}`);
            const data = await res.json();

            if (data.result === 'ok') {
              const sorted = data.data.sort((a, b) => {
                const numA = parseFloat(a.attributes.chapter) || 0;
                const numB = parseFloat(b.attributes.chapter) || 0;
                return numB - numA;
              });
              setChapters(sorted);
            }
          } catch (e) { console.error(e); }
          setLoading(false);
        };
        fetchChapters();
      }, [manga]);

      if (readingChapter) {
        return <MangaChapterReader manga={manga} chapterId={readingChapter} chapters={chapters} onChapterChange={setReadingChapter} onBack={() => setReadingChapter(null)} />;
      }

      return (
        <div className="fixed inset-0 z-[150] bg-gray-50 flex flex-col overflow-hidden">
           <div className="bg-white p-4 border-b border-gray-200 flex items-center gap-4 sticky top-0 shadow-sm z-10">
             <button onClick={onBack} className="px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg font-medium text-gray-700 transition-colors">← Back to Library</button>
             <h2 className="text-xl font-bold truncate text-gray-900">{manga.title}</h2>
           </div>
           <div className="flex-grow overflow-y-auto p-4 md:p-8 relative">
             <div className="max-w-4xl mx-auto flex flex-col md:flex-row gap-8 mb-8">
                {manga.cover_url ? (
                  <img src={manga.cover_url} alt="Cover" className="w-48 h-auto rounded-xl shadow-lg flex-shrink-0 object-cover" />
                ) : (
                  <div className="w-48 h-64 bg-gray-200 rounded-xl shadow-lg flex-shrink-0 flex items-center justify-center">No Cover</div>
                )}
                <div>
                  <h1 className="text-3xl font-extrabold mb-2 text-gray-900">{manga.title}</h1>
                  <p className="text-gray-500 mb-4 font-medium text-lg">{manga.author}</p>
                  <div className="inline-block px-3 py-1 bg-indigo-100 text-indigo-800 rounded-full text-sm font-bold shadow-sm border border-indigo-200">MangaDex Source</div>
                </div>
             </div>
             <div className="max-w-4xl mx-auto">
            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4 border-b border-gray-200 pb-4">
              <h3 className="text-2xl font-bold text-gray-900">Chapters</h3>
              {chapters.length > 0 && (
                <select 
                  className="w-full sm:w-auto px-4 py-2 bg-white border border-gray-300 text-gray-900 text-sm rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                  onChange={(e) => { if (e.target.value) setReadingChapter(e.target.value); }}
                  value=""
                >
                  <option value="" disabled>Jump to Chapter...</option>
                  {chapters.map(c => (
                    <option key={c.id} value={c.id}>
                      Ch. {c.attributes.chapter || '?'} {c.attributes.title ? `- ${c.attributes.title}` : ''} ({c.attributes.translatedLanguage || 'RAW'})
                    </option>
                  ))}
                </select>
              )}
            </div>
                {loading ? (
                  <div className="animate-pulse flex flex-col gap-3">{[1,2,3,4].map(i => <div key={i} className="h-14 bg-gray-200 rounded-xl"></div>)}</div>
                ) : chapters.length > 0 ? (
              <>
                <div className="grid gap-3 mb-8">
                  {chapters.slice((currentPage - 1) * chaptersPerPage, currentPage * chaptersPerPage).map(c => (
                    <div key={c.id} onClick={() => setReadingChapter(c.id)} className="p-4 bg-white border border-gray-200 rounded-xl shadow-sm hover:shadow-md hover:border-indigo-300 cursor-pointer flex justify-between items-center transition-all group">
                        <span className="font-bold text-gray-800 flex items-center gap-3">
                          <span className="bg-gray-200 text-gray-600 px-2 py-0.5 rounded-md text-[10px] font-bold uppercase tracking-wider">{c.attributes.translatedLanguage || 'RAW'}</span>
                          <span>Chapter {c.attributes.chapter || '?'} {c.attributes.title ? `- ${c.attributes.title}` : ''}</span>
                        </span>
                        <span className="text-sm font-bold text-indigo-500 group-hover:text-indigo-700">Read →</span>
                      </div>
                    ))}
                </div>
                
                {Math.ceil(chapters.length / chaptersPerPage) > 1 && (
                  <div className="flex justify-center items-center gap-4 bg-white p-2 rounded-xl shadow-sm border border-gray-100 w-fit mx-auto mb-8">
                    <button 
                      onClick={() => setCurrentPage(p => Math.max(1, p - 1))}
                      disabled={currentPage === 1}
                      className="px-4 py-2 bg-gray-50 hover:bg-gray-100 disabled:opacity-50 disabled:cursor-not-allowed text-gray-700 font-bold rounded-lg transition-colors"
                    >
                      ← Prev
                    </button>
                    <span className="font-bold text-gray-600 text-sm px-2">
                      Page {currentPage} of {Math.ceil(chapters.length / chaptersPerPage)}
                    </span>
                    <button 
                      onClick={() => setCurrentPage(p => Math.min(Math.ceil(chapters.length / chaptersPerPage), p + 1))}
                      disabled={currentPage === Math.ceil(chapters.length / chaptersPerPage)}
                      className="px-4 py-2 bg-gray-50 hover:bg-gray-100 disabled:opacity-50 disabled:cursor-not-allowed text-gray-700 font-bold rounded-lg transition-colors"
                    >
                      Next →
                    </button>
                  </div>
                )}
              </>
                ) : (
                  <div className="p-8 text-center bg-gray-100 rounded-xl text-gray-500 font-medium">No chapters found.</div>
                )}
             </div>
           </div>
        </div>
      );
    }

            <div className="flex-grow text-center px-4">
              <h2 className="text-lg font-bold text-gray-900 truncate">{book.title}</h2>

          </div>

            <button onClick={onBack} className="text-gray-600 hover:text-gray-900 px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg transition-colors text-sm font-bold flex items-center gap-2">← Back to Library</button>
            <div className="flex-grow text-center px-4">
              <h2 className="text-lg font-bold text-gray-900 truncate">{book.title}</h2>
              <p className="text-xs text-gray-500 truncate">Internet Archive E-Book Reader</p>
            </div>
            <div className="w-[140px] hidden md:block"></div>
          </div>
          <div className="flex-grow w-full overflow-hidden flex justify-center bg-gray-100/50">
            <div className="w-full max-w-4xl h-full bg-white shadow-2xl border-x border-gray-200">
              <iframe src={url} className="w-full h-full border-0" title={book.title} allowFullScreen></iframe>
            </div>
