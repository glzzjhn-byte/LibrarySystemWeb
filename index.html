    function DiscussionBoard({ library, user }) {
      const [messages, setMessages] = useState([]);
      const [newMessage, setNewMessage] = useState('');
      const [cooldown, setCooldown] = useState(0);
      const messagesEndRef = useRef(null);
      const [joinTime] = useState(() => Date.now() / 1000);

      const fetchMessages = async () => {
        try {
          const res = await apiFetch(`${API_URL}?action=get_messages&library_id=${library.id}`);
          setMessages(await res.json());
        } catch (e) { console.error(e); }
      };

      const displayedMessages = useMemo(() => {
        const botMsg = {
          id: 'system-bot-msg',
          username: 'System Bot',
          message: '⚠️ SAFETY WARNING: Never trust other users. Do not give out personal information. Please read the website policy guidelines.',
          timestamp: joinTime,
          isSystem: true
        };
        return [...messages, botMsg].sort((a, b) => a.timestamp - b.timestamp);
      }, [messages, joinTime]);

      useEffect(() => {
        fetchMessages();
        const interval = setInterval(fetchMessages, 3000); // Live poll every 3 seconds
        return () => clearInterval(interval);
      }, [library.id]);

      useEffect(() => {
        messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [displayedMessages]);

      useEffect(() => {
        if (cooldown > 0) {
          const timer = setTimeout(() => setCooldown(c => c - 1), 1000);
          return () => clearTimeout(timer);
        }
      }, [cooldown]);

      const handleSend = async (e) => {
        e.preventDefault();
        if (!newMessage.trim() || cooldown > 0) return;
        const text = newMessage;
        setNewMessage('');
        setCooldown(15);

        try {
          const res = await apiFetch(`${API_URL}?action=post_message`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ library_id: library.id, message: text })
          });
          if (!res.ok) {
            const data = await res.json();
            if (data.cooldown) setCooldown(data.cooldown);
          } else fetchMessages();
        } catch (err) { console.error(err); }
      };

      return (
        <div className="flex flex-col h-[650px] bg-[#313338] rounded-2xl shadow-2xl border border-gray-800 overflow-hidden font-sans">
          <div className="bg-[#2b2d31] p-4 border-b border-[#1e1f22] flex items-center justify-between shadow-sm z-10">
            <div className="flex items-center gap-2 text-white font-bold text-lg">
              <span className="text-gray-400 text-2xl leading-none">:D</span> discussion
            </div>
          </div>
          <div className="flex-grow overflow-y-auto p-4 space-y-5 bg-[#313338] scrollbar-thin scrollbar-thumb-gray-600 scrollbar-track-transparent">
            {displayedMessages.map((msg, idx) => {
              const timeString = new Date(msg.timestamp * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
              return (
                <div key={msg.id || idx} className={`flex items-start gap-4 hover:bg-[#2b2d31] p-2 -mx-2 rounded transition-colors group ${msg.isSystem ? 'bg-red-500/10 border border-red-500/20' : ''}`}>
                  <div className={`w-10 h-10 rounded-full flex items-center justify-center text-white font-bold flex-shrink-0 cursor-pointer hover:shadow-lg ${msg.isSystem ? 'bg-red-600' : 'bg-indigo-500'}`}>
                    {msg.isSystem ? '🤖' : msg.username.charAt(0).toUpperCase()}
                  </div>
                  <div className="flex flex-col flex-grow min-w-0">
                    <div className="flex items-baseline gap-2">
                      <span className={`font-bold hover:underline cursor-pointer ${msg.isSystem ? 'text-red-400' : 'text-[#f2f3f5]'}`}>{msg.username}</span>
                      {msg.isSystem && <span className="bg-red-500 text-white text-[9px] font-bold px-1.5 py-0.5 rounded uppercase tracking-wider">System</span>}
                      <span className="text-[11px] text-[#949ba4] font-medium">{timeString}</span>
                    </div>
                    <span className={`mt-0.5 whitespace-pre-wrap break-words leading-relaxed ${msg.isSystem ? 'text-red-200 font-medium' : 'text-[#dbdee1]'}`}>{msg.message}</span>
                  </div>
                </div>
              );
            })}
            <div ref={messagesEndRef} />
          </div>
          <div className="p-4 bg-[#313338]">
            <form onSubmit={handleSend} className="relative bg-[#383a40] rounded-xl flex items-center focus-within:ring-1 focus-within:ring-indigo-500">
              <input type="text" value={newMessage} onChange={e => setNewMessage(e.target.value)} placeholder="Message #general-discussion" disabled={cooldown > 0} className="w-full bg-transparent text-[#dbdee1] placeholder-[#949ba4] py-3.5 pl-4 pr-24 focus:outline-none disabled:opacity-50" />
              <div className="absolute right-2 top-0 bottom-0 flex items-center">
                {cooldown > 0 ? (
                  <span className="text-xs font-bold text-[#949ba4] px-3 h-full flex items-center select-none">Wait {cooldown}s</span>
                ) : (
                  <button type="submit" disabled={!newMessage.trim()} className="bg-indigo-500 hover:bg-indigo-600 disabled:bg-[#4e5058] disabled:text-[#949ba4] text-white font-bold py-1.5 px-4 rounded-md transition-colors text-sm mr-1">Send</button>
                )}
              </div>
            </form>
          </div>
        </div>
      );
    }

    function SearchResultsDropdown({ searchStatus, onlineResults, localBooks, canEdit, onAddToLibrary, onSaveToAccount }) {
      return (
        <div className="absolute top-full left-0 right-0 mt-2 bg-white rounded-2xl shadow-2xl overflow-x-auto overflow-y-auto z-[100] max-h-96 border border-gray-100">
          <div className="min-w-[400px] sm:min-w-0">
          {searchStatus.endsWith('...') || searchStatus.startsWith('Searching') ? (
            <div className="p-4 text-center text-sm text-gray-500 font-medium animate-pulse">{searchStatus}</div>
          ) : onlineResults.length > 0 ? (
            onlineResults.map((book, idx) => {
              const isAvailable = localBooks.some(lb => (lb.isbn && lb.isbn === book.isbn) || String(lb.title || '').toLowerCase() === String(book.title || '').toLowerCase());
              const safeSearchIsbn = String(book.isbn || '');
              const searchCoverSrc = book.cover_url || (safeSearchIsbn && safeSearchIsbn !== 'N/A' && !/^(MDEX|MAL|GUTEN|CSMT|IA):/.test(safeSearchIsbn) ? `https://covers.openlibrary.org/b/isbn/${safeSearchIsbn}-S.jpg` : null);
              return (
                <div key={idx} className="flex flex-row items-center p-3 border-b last:border-b-0 border-gray-50 hover:bg-gray-50 transition-colors gap-4">
                  <div className="flex items-center flex-grow min-w-0">
                    {searchCoverSrc ? (
                      <img src={searchCoverSrc} alt="cover" className="w-10 h-14 object-cover rounded shadow-sm mr-4 bg-gray-100 flex-shrink-0" />
                    ) : (
                      <div className="w-10 h-14 rounded shadow-sm mr-4 bg-gray-100 flex-shrink-0 flex items-center justify-center text-[10px] text-gray-400 text-center leading-tight">No Cover</div>
                    )}
                    <div className="flex-grow text-left min-w-0">
                      <h4 className="text-sm font-bold text-gray-900 truncate" title={book.title}>{book.title}</h4>
                      <p className="text-xs text-gray-500 truncate" title={book.author}>{book.author}</p>
                    </div>
                  </div>
                  <div className="flex-shrink-0 flex gap-2">
                    {isAvailable ? (
                      <span className="text-xs font-bold text-emerald-600 bg-emerald-50 px-3 py-1.5 rounded-lg border border-emerald-100">Saved</span>
                    ) : (
                      <>
                        {canEdit && <Button variant="secondary" className="!py-1.5 !px-3 !text-xs !w-auto !rounded-lg whitespace-nowrap" onClick={() => onAddToLibrary(book)}>To Library</Button>}
                        <Button variant="primary" className="!py-1.5 !px-3 !text-xs !w-auto !rounded-lg whitespace-nowrap" onClick={() => onSaveToAccount(book)}>To Account</Button>
                      </>
                    )}
                  </div>
                </div>
              );
            })
          ) : (
            <div className="p-4 text-center text-sm text-gray-500 font-medium">{searchStatus || 'No results found.'}</div>
          )}
          </div>
        </div>
      );
    }

    // --- Dashboard for a Specific Library ---
    function LibraryDashboard({ user, library, onBack }) {
      const [localBooks, setLocalBooks] = useState([]);
      const [onlineResults, setOnlineResults] = useState([]);
      const [query, setQuery] = useState('');
      const [searchStatus, setSearchStatus] = useState('');
      const [showAddForm, setShowAddForm] = useState(false);
      const [activeTab, setActiveTab] = useState(() => {
        return sessionStorage.getItem('apex_activeTab') || 'books';
      });
      const [members, setMembers] = useState([]);
      const [copiedCode, setCopiedCode] = useState(false);
      const [viewingManga, setViewingManga] = useState(null);
      const [viewingNovel, setViewingNovel] = useState(null);
      const [viewingEbook, setViewingEbook] = useState(null);

      useEffect(() => {
        sessionStorage.setItem('apex_activeTab', activeTab);
      }, [activeTab]);

      const handleCopyCode = () => {
        const code = `[${library.name}]_(${library.access_code})`;
        navigator.clipboard.writeText(code);
        setCopiedCode(true);
        setTimeout(() => setCopiedCode(false), 2000);
      };

      useEffect(() => {
        fetchBooks();
      }, [library]);

      useEffect(() => {
        if (activeTab === 'members') {
          fetchMembers();
        }
      }, [activeTab, library]);

      const fetchMembers = async () => {
        try {
          const res = await apiFetch(`${API_URL}?action=library_users&library_id=${library.id}`);
          setMembers(await res.json());
        } catch (error) {
          console.error('Error fetching members:', error);
        }
      };

      const searchMangaDex = async (q) => {
        try {
          const res = await apiFetch(`${API_URL}?action=search_manga&q=${encodeURIComponent(q)}`);
          const data = await res.json();
          setOnlineResults(data);
          setSearchStatus(data.length > 0 ? 'Search complete.' : 'No online results found.');
        } catch (error) {
          console.error(error);
          setSearchStatus('Error searching MangaDex.');
        }
      };

      const searchEbooks = async (q) => {
        try {
          const res = await apiFetch(`${API_URL}?action=search_ebooks&q=${encodeURIComponent(q)}`);
          const data = await res.json();
          setOnlineResults(data);
          setSearchStatus(data.length > 0 ? 'Search complete.' : 'No E-Books found.');
        } catch (error) {
          console.error(error);
          setSearchStatus('Error searching E-Books.');
        }
      };

      const searchNovels = async (q) => {
        try {
          const res = await apiFetch(`${API_URL}?action=search_novels&q=${encodeURIComponent(q)}`);
          const data = await res.json();
          setOnlineResults(data);
          setSearchStatus(data.length > 0 ? 'Search complete.' : 'No online results found.');
        } catch (error) {
          console.error(error);
          setSearchStatus('Error searching Gutendex API.');
        }
      };

      useEffect(() => {
        if (!query) {
          setOnlineResults([]);
          setSearchStatus('');
          return;
        }
        
        let statusText = 'Searching online...';
        if (activeTab === 'manga') {
            statusText = 'Searching MangaDex...';
        } else if (activeTab === 'novels') {
            statusText = 'Searching Gutendex...';
        } else if (activeTab === 'ebooks') {
            statusText = 'Searching Internet Archive...';
        }
        setSearchStatus(statusText);

        const timeoutId = setTimeout(() => {
          if (activeTab === 'manga') searchMangaDex(query);
          else if (activeTab === 'novels') searchNovels(query);
          else if (activeTab === 'ebooks') searchEbooks(query);
          else searchOnline(query);
        }, 500);
        return () => clearTimeout(timeoutId);
      }, [query, activeTab]);

      useEffect(() => {
        setQuery('');
        setOnlineResults([]);
        setSearchStatus('');
      }, [activeTab]);

      const fetchBooks = async () => {
        try {
          const response = await apiFetch(`${API_URL}?action=books&library_id=${library.id}`);
          const data = await response.json();
          setLocalBooks(data);
        } catch (error) {
          console.error('Error fetching books:', error);
        }
      };

      const addBook = async (book) => {
        try {
          await apiFetch(`${API_URL}?action=books`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ...book, library_id: library.id }),
          });
          fetchBooks(); 
          setShowAddForm(false);
        } catch (error) {
          console.error('Error adding book:', error);
        }
      };

      const deleteBook = async (id) => {
        try {
          await apiFetch(`${API_URL}?action=books&id=${id}`, { method: 'DELETE' });
          fetchBooks(); 
        } catch (error) {
          console.error('Error deleting book:', error);
        }
      };

      const searchOnline = async (q) => {
        try {
          const response = await apiFetch(`${API_URL}?action=search_online&q=${encodeURIComponent(q)}`);
          const data = await response.json();
          setOnlineResults(data);
          setSearchStatus(data.length > 0 ? 'Search complete.' : 'No online results found.');
        } catch (error) {
          console.error('Error searching online:', error);
          setSearchStatus('Error during search.');
        }
      };

      // --- Dashboard Editor Modal ---
      function DashboardEditorModal({ library, onClose, onSave }) {
        const [slides, setSlides] = useState([]);
        const [activeSlideId, setActiveSlideId] = useState(null);

        useEffect(() => {
          if (library.dashboard_slides) {
            try {
              const parsed = JSON.parse(library.dashboard_slides);
              setSlides(parsed);
              if (parsed.length > 0) setActiveSlideId(parsed[0].id);
            } catch (e) {
              initDefault();
            }
          } else {
            initDefault();
          }
        }, [library]);

        const initDefault = () => {
          const def = [{
            id: Date.now().toString(),
            name: 'Slide 1',
            content: `<div class="text-center space-y-6">\n  <h2 class="text-3xl md:text-5xl font-extrabold text-white tracking-tight">Discover your next great read.</h2>\n  <p class="text-indigo-200 text-lg md:text-xl max-w-2xl mx-auto">Search through your personal library or browse millions of titles online instantly.</p>\n</div>`,
            visible_roles: ['head', 'IT', 'moderator', 'member']
          }];
          setSlides(def);
          setActiveSlideId(def[0].id);
        };

        const handleAddSlide = () => {
          const newSlide = {
            id: Date.now().toString(),
            name: `Slide ${slides.length + 1}`,
            content: `<div class="text-center text-white space-y-4">\n  <h2 class="text-3xl font-bold">New Slide</h2>\n  <p>Your custom HTML here.</p>\n</div>`,
            visible_roles: ['head', 'IT', 'moderator', 'member']
          };
          setSlides([...slides, newSlide]);
          setActiveSlideId(newSlide.id);
        };

        const handleDeleteSlide = (id) => {
          const newSlides = slides.filter(s => s.id !== id);
          setSlides(newSlides);
          if (activeSlideId === id) {
            setActiveSlideId(newSlides.length > 0 ? newSlides[0].id : null);
          }
        };

        const activeSlide = slides.find(s => s.id === activeSlideId);

        const updateActiveSlide = (key, value) => {
          setSlides(slides.map(s => s.id === activeSlideId ? { ...s, [key]: value } : s));
        };

        const toggleRole = (role) => {
          if (!activeSlide) return;
          const roles = activeSlide.visible_roles || [];
          if (roles.includes(role)) {
            updateActiveSlide('visible_roles', roles.filter(r => r !== role));
          } else {
            updateActiveSlide('visible_roles', [...roles, role]);
          }
        };

        const allRoles = ['head', 'IT', 'moderator', 'member'];

        return (
          <div className="fixed inset-0 z-[100] bg-black/60 backdrop-blur-sm flex items-center justify-center p-2 sm:p-4">
            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-5xl h-[90vh] md:h-[80vh] flex flex-col overflow-hidden">
              <div className="flex justify-between items-center p-3 sm:p-4 border-b border-gray-100">
                <h2 className="text-lg sm:text-xl font-bold text-gray-800">Dashboard Code Editor</h2>
                <button onClick={onClose} className="text-gray-500 hover:text-gray-800 font-bold text-2xl leading-none">&times;</button>
              </div>
              <div className="flex flex-col md:flex-row flex-grow overflow-hidden">
                <div className="w-full md:w-64 bg-gray-50 border-b md:border-b-0 md:border-r border-gray-200 p-3 sm:p-4 flex flex-row md:flex-col gap-2 overflow-x-auto md:overflow-y-auto flex-shrink-0">
                  <h3 className="hidden md:block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Slides / Tabs</h3>
                  {slides.map(s => (
                    <div key={s.id} className={`flex justify-between items-center p-2 rounded-lg cursor-pointer whitespace-nowrap md:whitespace-normal flex-shrink-0 md:flex-shrink-1 ${activeSlideId === s.id ? 'bg-indigo-100 text-indigo-800' : 'hover:bg-gray-200 text-gray-700'}`} onClick={() => setActiveSlideId(s.id)}>
                      <span className="truncate mr-2 md:mr-0">{s.name}</span>
                      <button onClick={(e) => { e.stopPropagation(); handleDeleteSlide(s.id); }} className="text-red-400 hover:text-red-600 font-bold text-lg leading-none">&times;</button>
                    </div>
                  ))}
                  <button onClick={handleAddSlide} className="mt-0 md:mt-2 text-sm text-indigo-600 font-bold hover:underline text-left whitespace-nowrap md:whitespace-normal flex-shrink-0 md:flex-shrink-1">+ Add Slide</button>
                </div>
                
                <div className="flex-grow p-3 sm:p-4 flex flex-col gap-4 overflow-y-auto bg-gray-900 text-gray-100">
                  {activeSlide ? (
                    <>
                      <div className="flex flex-col sm:flex-row gap-2 sm:gap-4 sm:items-center">
                        <label className="font-bold whitespace-nowrap">Slide Name:</label>
                        <input type="text" value={activeSlide.name} onChange={e => updateActiveSlide('name', e.target.value)} className="bg-gray-800 border border-gray-700 rounded px-3 py-1.5 text-white focus:outline-none focus:border-indigo-500 w-full sm:max-w-xs" />
                      </div>
                      
                      <div className="flex flex-col flex-grow min-h-[200px]">
                        <label className="font-bold mb-2">HTML Code:</label>
                        <textarea 
                          value={activeSlide.content} 
                          onChange={e => updateActiveSlide('content', e.target.value)}
                          className="w-full flex-grow bg-gray-800 border border-gray-700 rounded-lg p-3 sm:p-4 font-mono text-xs sm:text-sm text-green-400 focus:outline-none focus:border-indigo-500"
                          spellCheck="false"
                        ></textarea>
                      </div>

                      <div>
                        <label className="font-bold mb-2 block">Visible to Roles:</label>
                        <div className="flex flex-wrap gap-3 sm:gap-4 bg-gray-800 p-3 rounded-lg border border-gray-700">
                          {allRoles.map(r => (
                            <label key={r} className="flex items-center gap-2 cursor-pointer">
                              <input type="checkbox" checked={(activeSlide.visible_roles || []).includes(r)} onChange={() => toggleRole(r)} className="rounded text-indigo-600 w-4 h-4" />
                              <span className="capitalize text-sm sm:text-base">{r}</span>
                            </label>
                          ))}
                        </div>
                      </div>
                    </>
                  ) : (
                    <div className="flex items-center justify-center h-full text-gray-500">Select or add a slide to edit.</div>
                  )}
                </div>
              </div>
              <div className="p-3 sm:p-4 border-t border-gray-100 flex justify-end gap-3 bg-gray-50 flex-shrink-0">
                <Button variant="secondary" onClick={onClose} className="!w-auto">Cancel</Button>
                <Button variant="primary" onClick={() => onSave(slides)} className="!w-auto">Save Changes</Button>
              </div>
            </div>
          </div>
        );
      }

      const handlePromote = async (targetUserId, newRole) => {
        try {
          await apiFetch(`${API_URL}?action=promote_user`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ library_id: library.id, target_user_id: targetUserId, user_id: user.id, new_role: newRole })
          });
          fetchMembers(); // Refresh the table after promotion
        } catch (error) {
          console.error('Error promoting user:', error);
        }
      };

      const [uploadingMedia, setUploadingMedia] = useState(false);
      const [dashboardMedia, setDashboardMedia] = useState({
        url: library.dashboard_media_url,
        type: library.dashboard_media_type
      });

      const handleMediaUpload = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setUploadingMedia(true);
        const formData = new FormData();
        formData.append('media', file);
        formData.append('library_id', library.id);

        try {
          const res = await apiFetch(`${API_URL}?action=upload_media`, {
            method: 'POST',
            body: formData,
          });
          const data = await res.json();
          if (res.ok) {
            setDashboardMedia({ url: data.url, type: data.type });
          } else {
            alert(data.message || 'Upload failed');
          }
        } catch (err) {
          console.error(err);
          alert('Error uploading media');
        } finally {
          setUploadingMedia(false);
        }
      };

      const [isEditingDashboard, setIsEditingDashboard] = useState(false);
      const [dashboardSlides, setDashboardSlides] = useState(() => {
        if (library.dashboard_slides) {
          try {
            return JSON.parse(library.dashboard_slides);
          } catch (e) { return null; }
        }
        return null;
      });
      const [currentSlideIndex, setCurrentSlideIndex] = useState(0);
      
      const visibleSlides = useMemo(() => {
        if (!dashboardSlides) return [];
        return dashboardSlides.filter(s => (s.visible_roles || []).includes(library.role));
      }, [dashboardSlides, library.role]);

      useEffect(() => {
        if (currentSlideIndex >= visibleSlides.length) {
          setCurrentSlideIndex(0);
        }
      }, [visibleSlides, currentSlideIndex]);

      const handleSaveSlides = async (slides) => {
        try {
          const res = await apiFetch(`${API_URL}?action=update_dashboard_slides`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ library_id: library.id, slides })
          });
          if (res.ok) {
            setDashboardSlides(slides);
            setIsEditingDashboard(false);
            library.dashboard_slides = JSON.stringify(slides);
          } else {
            alert('Failed to save slides');
          }
        } catch (err) {
          console.error(err);
        }
      };

      const handleAddToLibrary = (book) => {
        addBook(book);
        setQuery('');
      };

      const handleSaveToAccount = async (book) => {
        try {
          await apiFetch(`${API_URL}?action=books`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ...book, library_id: 0 }),
          });
          fetchBooks(); 
          setQuery('');
        } catch (error) {
          console.error('Error saving book:', error);
        }
      };
      
      const handleReadBook = (book) => {
        const safeIsbn = String(book.isbn || '');
        if (safeIsbn.startsWith('IA:')) setViewingEbook(book);
        else if (safeIsbn.startsWith('GUTEN:')) setViewingNovel(book);
        else if (safeIsbn.startsWith('MDEX:') || safeIsbn.startsWith('CSMT:')) setViewingManga(book);
      };

      const displayedBooks = useMemo(() => {
        const lowerQuery = query.toLowerCase();
        let items = localBooks;
        if (activeTab === 'manga') items = localBooks.filter(b => b.media_type === 'manga');
        else if (activeTab === 'novels') items = localBooks.filter(b => b.media_type === 'novel');
        else if (activeTab === 'ebooks') items = localBooks.filter(b => b.media_type === 'ebook');
        else items = localBooks.filter(b => b.media_type !== 'manga' && b.media_type !== 'novel' && b.media_type !== 'ebook');
        
        const filteredLocal = query ? items.filter(b =>
          String(b.title || '').toLowerCase().includes(lowerQuery) ||
          String(b.author || '').toLowerCase().includes(lowerQuery)
        ) : items;

        return filteredLocal.map(b => ({ ...b, status: b.library_id == 0 ? 'personal' : 'local' }));
      }, [query, localBooks, activeTab]);

      const canEdit = ['head', 'moderator', 'IT'].includes(library.role);

      return (
        <div className="min-h-screen flex flex-col">
          {/* Navbar */}
          <header className="bg-white/80 backdrop-blur-md sticky top-0 z-40 border-b border-gray-200 shadow-sm">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3 min-h-[4rem] flex flex-wrap sm:flex-nowrap justify-between items-center gap-2 sm:gap-4">
              <div className="flex items-start sm:items-center gap-2 text-indigo-600 min-w-0 w-full sm:w-auto flex-grow">
                <button onClick={onBack} className="text-gray-400 hover:text-indigo-600 mr-1 sm:mr-2 mt-1 sm:mt-0 flex-shrink-0">← Back</button>
                <div className="hidden sm:block"><BookIcon /></div>
                <div className="min-w-0 flex-grow">
                  <h1 className="text-lg sm:text-xl font-extrabold tracking-tight text-gray-900 flex flex-wrap items-center gap-2"><span className="truncate max-w-[200px] sm:max-w-xs md:max-w-md">{library.name}</span> <span className="text-[10px] font-bold px-2 py-0.5 bg-indigo-100 text-indigo-700 rounded-md uppercase tracking-wider flex-shrink-0">{library.role}</span></h1>
                  {['head', 'moderator'].includes(library.role) && (
                    <div className="text-[10px] sm:text-xs font-mono text-gray-500 mt-1 flex flex-col sm:flex-row sm:items-center gap-1 sm:truncate">
                      <span className="hidden sm:inline">Members join with:</span>
                      <span className="sm:hidden font-semibold">Join Code:</span>
                      <button onClick={handleCopyCode} className="font-bold text-gray-800 bg-gray-100 hover:bg-indigo-50 hover:text-indigo-700 px-1.5 py-0.5 rounded cursor-pointer transition-colors active:scale-95 border border-gray-200 hover:border-indigo-200 text-left break-all whitespace-normal sm:truncate">
                        {copiedCode ? '✓ Copied!' : `[${library.name}]_(${library.access_code})`}
                      </button>
                    </div>
                  )}
                </div>
              </div>
              <div className="text-sm font-medium text-gray-500 flex-shrink-0 hidden md:block ml-auto">{user.username}</div>
            </div>
          </header>

          {/* Hero / Search Section */}
      {activeTab === 'books' && (
            <div className="bg-gradient-to-br from-indigo-900 via-indigo-800 to-purple-900 py-12 md:py-20 px-4 relative z-30">
              {/* Isolated Background Wrapper */}
              <div className="absolute inset-0 overflow-hidden pointer-events-none">
              {dashboardMedia.url && (
                dashboardMedia.type === 'video' ? (
                  <video autoPlay loop muted playsInline className="absolute inset-0 w-full h-full object-cover opacity-40 mix-blend-overlay">
                    <source src={dashboardMedia.url} />
                  </video>
                ) : (
                  <img src={dashboardMedia.url} alt="Dashboard Background" className="absolute inset-0 w-full h-full object-cover opacity-30 mix-blend-overlay" />
                )
              )}
                <div className="absolute top-0 left-0 w-full h-full bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCI+PHBhdGggZD0iTTAgMGg0MHY0MEgweiIgZmlsbD0ibm9uZSIvPjxwYXRoIGQ9Ik0wIDEwaDQwdjFIMHptMTAgMTBoMzB2MUgxMHptMTAgMTBoMjB2MUgyMHoiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wNSkiLz48L3N2Zz4=')] opacity-30"></div>
              </div>
              {(library.role === 'IT' || library.role === 'head') && (
                <div className="absolute top-4 right-4 z-50 flex gap-2">
                  <button onClick={() => setIsEditingDashboard(true)} className="cursor-pointer bg-indigo-600/80 hover:bg-indigo-600 text-white text-sm px-4 py-2 rounded-xl backdrop-blur-md transition-all border border-indigo-500 shadow-lg">💻 Edit Code</button>
                  <div className="relative">
                    <input type="file" id="mediaUpload" className="hidden" accept="image/*,video/mp4,video/webm" onChange={handleMediaUpload} disabled={uploadingMedia} />
                    <label htmlFor="mediaUpload" className={`cursor-pointer bg-white/20 hover:bg-white/30 text-white text-sm px-4 py-2 rounded-xl backdrop-blur-md transition-all inline-block border border-white/30 shadow-lg ${uploadingMedia ? 'opacity-50 cursor-wait' : ''}`}>
                      {uploadingMedia ? 'Uploading...' : '✏️ Edit Media'}
                    </label>
                  </div>
                </div>
              )}
              <div className="max-w-4xl mx-auto relative z-30 space-y-6">
                
                {visibleSlides.length > 0 ? (
                  <div className="relative">
                    {visibleSlides.map((slide, idx) => (
                      <div key={slide.id} style={{ display: currentSlideIndex === idx ? 'block' : 'none' }}>
                        <div dangerouslySetInnerHTML={{ __html: slide.content }}></div>
                      </div>
                    ))}
                    {visibleSlides.length > 1 && (
                      <div className="flex justify-center gap-2 mt-4">
                        {visibleSlides.map((_, idx) => (
                          <button key={idx} onClick={() => setCurrentSlideIndex(idx)} className={`w-3 h-3 rounded-full transition-colors ${currentSlideIndex === idx ? 'bg-white' : 'bg-white/30 hover:bg-white/50'}`}></button>
                        ))}
                      </div>
                    )}
                  </div>
                ) : (
                  <div className="text-center space-y-6">
                    <h2 className="text-3xl md:text-5xl font-extrabold text-white tracking-tight">Discover your next great read.</h2>
                    <p className="text-indigo-200 text-lg md:text-xl max-w-2xl mx-auto">Search through your personal library or browse millions of titles online instantly.</p>
                  </div>
                )}
                
                <div className="relative max-w-2xl mx-auto mt-8 flex flex-col md:flex-row gap-4">
                  <div className="relative flex-grow">
                    <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                      <SearchIcon />
                    </div>
                    <input type="text" placeholder="Search by title, author, or ISBN..." value={query} onChange={(e) => setQuery(e.target.value)} className="w-full pl-12 pr-4 py-4 bg-white/10 backdrop-blur-md border border-white/20 text-white placeholder-indigo-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-white/50 focus:bg-white/20 transition-all text-lg shadow-2xl" />
                    
                    {query.length >= 3 && <SearchResultsDropdown searchStatus={searchStatus} onlineResults={onlineResults} localBooks={localBooks} canEdit={canEdit} onAddToLibrary={handleAddToLibrary} onSaveToAccount={handleSaveToAccount} />}
                  </div>
                  {canEdit && (
                    <Button onClick={() => setShowAddForm(!showAddForm)} className="md:w-auto px-8 !bg-white !text-indigo-900 hover:!bg-gray-100 whitespace-nowrap !rounded-2xl">
                      {showAddForm ? 'Close Form' : '+ Add Book'}
                    </Button>
                  )}
                </div>
              </div>
            </div>
          )}

          {/* Main Content Area */}
          <main className={`flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 w-full relative z-20 ${activeTab === 'books' ? '-mt-8' : ''}`}>
            
            {/* Tabs */}
            <div className="w-full overflow-x-auto mb-8">
              <div className="flex gap-6 border-b border-gray-200">
                <button onClick={() => setActiveTab('books')} className={`pb-3 text-lg font-bold transition-colors whitespace-nowrap ${activeTab === 'books' ? 'text-indigo-600 border-b-2 border-indigo-600' : 'text-gray-400 hover:text-gray-600'}`}>Books</button>
                <button onClick={() => setActiveTab('ebooks')} className={`pb-3 text-lg font-bold transition-colors whitespace-nowrap ${activeTab === 'ebooks' ? 'text-indigo-600 border-b-2 border-indigo-600' : 'text-gray-400 hover:text-gray-600'}`}>E-Books</button>
                <button onClick={() => setActiveTab('novels')} className={`pb-3 text-lg font-bold transition-colors whitespace-nowrap ${activeTab === 'novels' ? 'text-indigo-600 border-b-2 border-indigo-600' : 'text-gray-400 hover:text-gray-600'}`}>Novels</button>
                <button onClick={() => setActiveTab('manga')} className={`pb-3 text-lg font-bold transition-colors whitespace-nowrap ${activeTab === 'manga' ? 'text-indigo-600 border-b-2 border-indigo-600' : 'text-gray-400 hover:text-gray-600'}`}>Manga</button>
                <button onClick={() => setActiveTab('discussion')} className={`pb-3 text-lg font-bold transition-colors whitespace-nowrap ${activeTab === 'discussion' ? 'text-indigo-600 border-b-2 border-indigo-600' : 'text-gray-400 hover:text-gray-600'}`}>Discussion</button>
                {canEdit && (
                  <button onClick={() => setActiveTab('members')} className={`pb-3 text-lg font-bold transition-colors whitespace-nowrap ${activeTab === 'members' ? 'text-indigo-600 border-b-2 border-indigo-600' : 'text-gray-400 hover:text-gray-600'}`}>Members</button>
                )}
              </div>
            </div>

            {activeTab === 'books' ? (
              <>
                {canEdit && showAddForm && <AddBookForm onAddBook={addBook} onCancel={() => setShowAddForm(false)} />}

                {displayedBooks.length > 0 ? (
                  <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 md:gap-8">
                    {displayedBooks.map((book, index) => (
                      <BookCard key={book.id || book.isbn || index} book={book} actionType={book.status === 'personal' || (canEdit && book.status === 'local') ? 'delete' : null} onAction={deleteBook} onRead={handleReadBook} />
                    ))}
                  </div>
                ) : (
                  <div className="text-center py-20 bg-white rounded-3xl border border-gray-100 shadow-sm">
                    <div className="w-16 h-16 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-4 text-gray-300"><BookIcon /></div>
                    <h3 className="text-xl font-bold text-gray-900 mb-2">No books found</h3>
                    <p className="text-gray-500 max-w-sm mx-auto">We couldn't find any books matching your criteria. Try adjusting your search or add a new book manually.</p>
                  </div>
                )}
              </>
            ) : activeTab === 'novels' ? (
              <div className="space-y-8">{/* Dedicated Novel Search */}
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 relative z-50">
                  <h3 className="text-xl font-bold text-gray-900 mb-4 flex items-center gap-2">Discover Classic Novels</h3>
                  <div className="relative">
                    <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                      <SearchIcon />
                    </div>
                    <input 
                      type="text" 
                      placeholder="Search for novels..." 
                      value={query} 
                      onChange={(e) => setQuery(e.target.value)} 
                      className="w-full pl-12 pr-4 py-3 bg-gray-50 border border-gray-200 text-gray-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-lg" 
                    />
                    {query.length >= 3 && <SearchResultsDropdown searchStatus={searchStatus} onlineResults={onlineResults} localBooks={localBooks} canEdit={canEdit} onAddToLibrary={handleAddToLibrary} onSaveToAccount={handleSaveToAccount} />}
                  </div>
                </div>
                
                {/* Local Novel Grid */}
                <div>
                  <h3 className="text-xl font-bold mb-4 text-gray-900">Novels in Library</h3>
                  {displayedBooks.length > 0 ? (
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 md:gap-8">
                      {displayedBooks.map((book, index) => (
                        <BookCard key={book.id || book.isbn || index} book={book} actionType={book.status === 'personal' || (canEdit && book.status === 'local') ? 'delete' : null} onAction={deleteBook} onRead={setViewingNovel} />
                      ))}
                    </div>
                  ) : (
                    <div className="text-center py-20 bg-white rounded-3xl border border-gray-100 shadow-sm">
                      <div className="w-16 h-16 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-4 text-gray-300"><BookIcon /></div>
                      <h3 className="text-xl font-bold text-gray-900 mb-2">No novels found</h3>
                      <p className="text-gray-500 max-w-sm mx-auto">We couldn't find any novels in your library. Search above to add some!</p>
                    </div>
                  )}
                </div>
              </div>
            ) : activeTab === 'ebooks' ? (
              <div className="space-y-8">
                {/* Dedicated E-Books Search */}
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 relative z-50">
                  <h3 className="text-xl font-bold text-gray-900 mb-4 flex items-center gap-2">Discover E-Books</h3>
                  <div className="relative">
                    <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                      <SearchIcon />
                    </div>
                    <input 
                      type="text" 
                      placeholder="Search for readable E-Books..." 
                      value={query} 
                      onChange={(e) => setQuery(e.target.value)} 
                      className="w-full pl-12 pr-4 py-3 bg-gray-50 border border-gray-200 text-gray-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-lg" 
                    />
                    {query.length >= 3 && <SearchResultsDropdown searchStatus={searchStatus} onlineResults={onlineResults} localBooks={localBooks} canEdit={canEdit} onAddToLibrary={handleAddToLibrary} onSaveToAccount={handleSaveToAccount} />}
                  </div>
                </div>
                
                {/* Local E-Books Grid */}
                <div>
                  <h3 className="text-xl font-bold mb-4 text-gray-900">E-Books in Library</h3>
                  {displayedBooks.length > 0 ? (
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 md:gap-8">
                      {displayedBooks.map((book, index) => (
                      <BookCard key={book.id || book.isbn || index} book={book} actionType={book.status === 'personal' || (canEdit && book.status === 'local') ? 'delete' : null} onAction={deleteBook} onRead={handleReadBook} />
                      ))}
                    </div>
                  ) : (
                    <div className="text-center py-20 bg-white rounded-3xl border border-gray-100 shadow-sm">
                      <div className="w-16 h-16 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-4 text-gray-300"><BookIcon /></div>
                      <h3 className="text-xl font-bold text-gray-900 mb-2">No E-Books found</h3>
                      <p className="text-gray-500 max-w-sm mx-auto">We couldn't find any E-Books in your library. Search above to add some!</p>
                    </div>
                  )}
                </div>
              </div>
            ) : activeTab === 'manga' ? (
              <div className="space-y-8">
                {/* Dedicated Manga Search */}
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 relative z-50">
                  <h3 className="text-xl font-bold text-gray-900 mb-4 flex items-center gap-2">Discover Manga & Manhwa</h3>
                  <div className="relative">
                    <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                      <SearchIcon />
                    </div>
                    <input 
                      type="text" 
                      placeholder="Search MangaDex for titles to read..." 
                      value={query} 
                      onChange={(e) => setQuery(e.target.value)} 
                      className="w-full pl-12 pr-4 py-3 bg-gray-50 border border-gray-200 text-gray-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-lg" 
                    />
                    {query.length >= 3 && <SearchResultsDropdown searchStatus={searchStatus} onlineResults={onlineResults} localBooks={localBooks} canEdit={canEdit} onAddToLibrary={handleAddToLibrary} onSaveToAccount={handleSaveToAccount} />}
                  </div>
                </div>
                
                {/* Local Manga Grid */}
                <div>
                  <h3 className="text-xl font-bold mb-4 text-gray-900">Manga in Library</h3>
                  {displayedBooks.length > 0 ? (
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 md:gap-8">
                      {displayedBooks.map((book, index) => (
                      <BookCard key={book.id || book.isbn || index} book={book} actionType={book.status === 'personal' || (canEdit && book.status === 'local') ? 'delete' : null} onAction={deleteBook} onClick={() => setViewingManga(book)} onRead={handleReadBook} />
                      ))}
                    </div>
                  ) : (
                    <div className="text-center py-20 bg-white rounded-3xl border border-gray-100 shadow-sm">
                      <div className="w-16 h-16 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-4 text-gray-300"><BookIcon /></div>
                      <h3 className="text-xl font-bold text-gray-900 mb-2">No manga found</h3>
                      <p className="text-gray-500 max-w-sm mx-auto">We couldn't find any manga in your library. Search above to add some!</p>
                    </div>
                  )}
                </div>
              </div>
            ) : activeTab === 'discussion' ? (
              <div className="max-w-5xl mx-auto">
                <DiscussionBoard library={library} user={user} />
              </div>
            ) : (
              <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <table className="w-full text-left border-collapse">
                  <thead>
                    <tr className="bg-gray-50 border-b border-gray-100">
                      <th className="py-4 px-6 font-semibold text-gray-600">Username</th>
                      <th className="py-4 px-6 font-semibold text-gray-600">Role</th>
                      <th className="py-4 px-6 font-semibold text-gray-600 text-right">Actions</th>
                    </tr>
                  </thead>
                  <tbody>
                    {members.map(m => (
                      <tr key={m.id} className="border-b border-gray-50 hover:bg-gray-50/50">
                        <td className="py-4 px-6 font-medium text-gray-900">{m.username}</td>
                        <td className="py-4 px-6">
                          <span className={`text-xs font-bold uppercase px-2.5 py-1 rounded-full ${m.role === 'head' ? 'bg-purple-100 text-purple-700' : m.role === 'IT' ? 'bg-blue-100 text-blue-700' : m.role === 'moderator' ? 'bg-emerald-100 text-emerald-700' : 'bg-gray-100 text-gray-700'}`}>{m.role}</span>
                        </td>
                        <td className="py-4 px-6 text-right">
                          {library.role === 'head' && m.role !== 'head' && (
                            <div className="flex justify-end gap-2">
                              {m.role !== 'moderator' && <Button onClick={() => handlePromote(m.id, 'moderator')} variant="secondary" className="!w-auto !py-1 !px-3 !text-xs inline-block">Make Mod</Button>}
                              {m.role !== 'IT' && <Button onClick={() => handlePromote(m.id, 'IT')} variant="secondary" className="!w-auto !py-1 !px-3 !text-xs inline-block">Make IT</Button>}
                              {m.role !== 'member' && <Button onClick={() => handlePromote(m.id, 'member')} variant="secondary" className="!w-auto !py-1 !px-3 !text-xs inline-block">Make Member</Button>}
                            </div>
                          )}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </main>
          
          {/* Dashboard Editor Overlay */}
          {isEditingDashboard && (
            <DashboardEditorModal library={library} onClose={() => setIsEditingDashboard(false)} onSave={handleSaveSlides} />
          )}
      
      {viewingManga && <MangaView manga={viewingManga} onBack={() => setViewingManga(null)} />}
      {viewingNovel && <NovelReader book={viewingNovel} onBack={() => setViewingNovel(null)} />}
      {viewingEbook && <EbookReader book={viewingEbook} onBack={() => setViewingEbook(null)} />}
        </div>
      );
    }

    // --- Root App Coordinator ---
    function App() {
      const [user, setUser] = useState(null);
      const [currentLibrary, setCurrentLibrary] = useState(() => {
        const saved = sessionStorage.getItem('apex_currentLibrary');
        return saved ? JSON.parse(saved) : null;
      });
      const [isLoadingSession, setIsLoadingSession] = useState(true);
      const [policyAccepted, setPolicyAccepted] = useState(null);

      useEffect(() => {
        if (currentLibrary) {
          sessionStorage.setItem('apex_currentLibrary', JSON.stringify(currentLibrary));
        } else {
          sessionStorage.removeItem('apex_currentLibrary');
        }
      }, [currentLibrary]);

      useEffect(() => {
        const initApp = async () => {
          try {
            const policyRes = await apiFetch(`${API_URL}?action=check_policy`);
            if (policyRes.ok) {
              const policyData = await policyRes.json();
              setPolicyAccepted(policyData.accepted);
            } else {
              setPolicyAccepted(true);
            }

            const res = await apiFetch(`${API_URL}?action=check_auth`);
            if (res.ok) {
              const data = await res.json();
              setUser(data.user);
            } else {
              setCurrentLibrary(null);
            }
          } catch (err) {
            console.error("No active session.");
            setCurrentLibrary(null);
            if (policyAccepted === null) setPolicyAccepted(true);
          } finally {
            setIsLoadingSession(false);
          }
        };
        initApp();
      }, []);

      const handleLogout = async () => {
        await apiFetch(`${API_URL}?action=logout`, { method: 'POST' });
        setUser(null);
        setCurrentLibrary(null);
        sessionStorage.removeItem('apex_activeTab');
      };

      if (isLoadingSession) {
        return <div className="min-h-screen flex items-center justify-center bg-gray-50"><div className="animate-pulse text-indigo-600 font-bold">Verifying Session...</div></div>;
      }

      if (policyAccepted === false) {
        return <PolicyScreen onAccept={() => setPolicyAccepted(true)} />;
      }

      if (!user) {
        return <AuthScreen onLogin={(userData) => setUser(userData)} />;
      }

      if (!currentLibrary) {
        return <LibraryPortal user={user} onSelectLibrary={setCurrentLibrary} onLogout={handleLogout} />;
      }

      return <LibraryDashboard user={user} library={currentLibrary} onBack={() => setCurrentLibrary(null)} />;
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
